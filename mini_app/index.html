<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>DNK Mini App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css?v=5" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <div class="brand">
          <span class="logo"></span>
          <div class="brand-text">
            <div class="brand-name">DNK</div>
            <div class="brand-sub">обувь • одежда</div>
          </div>
        </div>
        <button id="cartButton" class="icon-button">
          🛒 <span id="cartCount" class="badge">0</span>
        </button>
      </header>

      <main class="content" id="catalogView">
        <section id="categories" class="section">
          <h2>Категории</h2>
          <div class="chips" id="categoryChips"></div>
        </section>

        <section id="products" class="section">
          <h2 id="productsTitle">Товары</h2>
          <div id="productGrid" class="product-grid"></div>
        </section>
      </main>

      <div id="cartPanel" class="cart-panel hidden">
        <div class="cart-header">
          <h2>Корзина</h2>
          <button id="closeCart" class="icon-button">✕</button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
          <div class="cart-total">
            <span>Итого:</span>
            <span id="cartTotal" class="cart-total-amount">0 ₽</span>
          </div>
          <button id="checkoutButton" class="primary-button">
            Оформить заказ
          </button>
        </div>
      </div>

      <div id="searchPanel" class="search-panel hidden">
        <div class="search-header">
          <div class="profile-title">
            <div class="profile-avatar">🔍</div>
            <div>
              <div class="profile-title-main">Поиск</div>
              <div class="profile-title-sub">
                Найдите нужную модель по названию или описанию
              </div>
            </div>
          </div>
          <button id="closeSearch" class="icon-button">✕</button>
        </div>
        <div class="search-body">
          <div class="field">
            <input
              id="searchQuery"
              class="field-input"
              placeholder="Введите название или бренд"
            />
          </div>
          <div id="searchResults" class="product-grid"></div>
        </div>
      </div>

      <div id="profilePanel" class="profile-panel hidden">
        <div class="profile-header">
          <div class="profile-title">
            <div class="profile-avatar">👤</div>
            <div>
              <div class="profile-title-main">Профиль</div>
              <div class="profile-title-sub">
                Размеры, город и контакты для заказов
              </div>
            </div>
          </div>
          <button id="closeProfile" class="icon-button">✕</button>
        </div>
        <div class="profile-body">
          <div class="field">
            <label class="field-label" for="shoeSize">Размер обуви</label>
            <input id="shoeSize" class="field-input" placeholder="Например 42" />
            <div id="shoeError" class="field-error"></div>
          </div>
          <div class="field">
            <label class="field-label" for="clothingSize">Размер одежды</label>
            <input
              id="clothingSize"
              class="field-input"
              placeholder="S / M / L или RU 46"
            />
            <div id="clothingError" class="field-error"></div>
          </div>
          <div class="field">
            <label class="field-label" for="city">Город</label>
            <select id="city" class="field-input">
              <option value="Минск">Минск</option>
              <option value="Брест">Брест</option>
              <option value="Витебск">Витебск</option>
              <option value="Гродно">Гродно</option>
              <option value="Гомель">Гомель</option>
              <option value="Могилёв">Могилёв</option>
              <option value="Барановичи">Барановичи</option>
              <option value="Бобруйск">Бобруйск</option>
              <option value="Борисов">Борисов</option>
              <option value="Лида">Лида</option>
              <option value="Молодечно">Молодечно</option>
              <option value="Орша">Орша</option>
              <option value="Пинск">Пинск</option>
              <option value="Полоцк">Полоцк</option>
              <option value="Новополоцк">Новополоцк</option>
              <option value="Солигорск">Солигорск</option>
              <option value="Мозырь">Мозырь</option>
            </select>
            <div id="cityError" class="field-error"></div>
          </div>
          <div class="field">
            <label class="field-label" for="delivery">Способ доставки</label>
            <select id="delivery" class="field-input">
              <option value="Личная встреча">Личная встреча</option>
              <option value="Европочта">Европочта</option>
              <option value="Белпочта">Белпочта</option>
            </select>
            <div id="deliveryError" class="field-error"></div>
          </div>
          <div class="field">
            <label class="field-label" for="phone">Телефон</label>
            <input
              id="phone"
              class="field-input"
              placeholder="+375 29 123 45 67"
              inputmode="tel"
            />
            <div id="phoneError" class="field-error"></div>
          </div>
            <p class="field-hint">
              Данные нужны, чтобы менеджер быстрее оформил заказ. Они хранятся в
              DNK и не передаются третьим лицам.
            </p>
          </div>
        <div class="profile-footer">
          <button id="saveProfileButton" class="primary-button">
            Сохранить профиль
          </button>
        </div>
      </div>
      <nav class="bottom-nav">
        <button
          id="tabCatalog"
          class="bottom-nav-item bottom-nav-item--active"
        >
          Каталог
        </button>
        <button id="tabSearch" class="bottom-nav-item">Поиск</button>
        <button id="tabProfile" class="bottom-nav-item">Профиль</button>
      </nav>
    </div>

    <script src="main.js?v=5"></script>
  </body>
  </html>
