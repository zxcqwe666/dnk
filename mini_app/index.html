<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>UNICORN Mini App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <div class="brand">
          <span class="logo">🦄</span>
          <div class="brand-text">
            <div class="brand-name">UNICORN</div>
            <div class="brand-sub">обувь • одежда</div>
          </div>
        </div>
        <button id="cartButton" class="icon-button">
          🛒 <span id="cartCount" class="badge">0</span>
        </button>
      </header>

      <main class="content">
        <section id="categories" class="section">
          <h2>Категории</h2>
          <div class="chips" id="categoryChips"></div>
        </section>

        <section id="products" class="section">
          <h2 id="productsTitle">Товары</h2>
          <div id="productGrid" class="product-grid"></div>
        </section>
      </main>

      <div id="cartPanel" class="cart-panel hidden">
        <div class="cart-header">
          <h2>Корзина</h2>
          <button id="closeCart" class="icon-button">✕</button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
          <div class="cart-total">
            <span>Итого:</span>
            <span id="cartTotal" class="cart-total-amount">0 ₽</span>
          </div>
          <button id="checkoutButton" class="primary-button">
            Оформить заказ
          </button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
  </html>
